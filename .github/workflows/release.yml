name: Release Debian Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing tag to attach the .deb to, for example v0.1.0'
        required: false
        type: string
      create_release:
        description: 'Create or update the GitHub release for release_tag'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name }}-${{ inputs.release_tag || 'artifact-only' }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and attach .deb
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag belongs to main
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main --tags

          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          main_commit="$(git rev-parse origin/main)"

          if ! git merge-base --is-ancestor "$tag_commit" "$main_commit"; then
            echo "Tag $GITHUB_REF_NAME does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

      - name: Verify tag matches Debian package version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail

          package_version="$(dpkg-parsechangelog -S Version)"
          if [ "$GITHUB_REF_NAME" != "$package_version" ] && [ "$GITHUB_REF_NAME" != "v$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Debian package version $package_version." >&2
            echo "Use either $package_version or v$package_version." >&2
            exit 1
          fi

      - name: Verify manual release tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "release_tag is required when create_release is enabled." >&2
            exit 1
          fi

          git fetch origin main:refs/remotes/origin/main --tags

          package_version="$(dpkg-parsechangelog -S Version)"
          release_tag="${{ inputs.release_tag }}"

          if [ "$release_tag" != "$package_version" ] && [ "$release_tag" != "v$package_version" ]; then
            echo "Release tag $release_tag does not match Debian package version $package_version." >&2
            echo "Use either $package_version or v$package_version." >&2
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$release_tag" >/dev/null; then
            echo "Tag $release_tag does not exist." >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "$release_tag")"
          main_commit="$(git rev-parse origin/main)"

          if ! git merge-base --is-ancestor "$tag_commit" "$main_commit"; then
            echo "Tag $release_tag does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

      - name: Install build dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            desktop-file-utils \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            meson \
            ninja-build \
            pkg-config \
            valac

      - name: Validate metadata
        run: |
          set -euo pipefail

          desktop-file-validate data/charge-controller.desktop data/charge-controller-autostart.desktop
          python3 -c "import xml.etree.ElementTree as ET; [ET.parse(p) for p in ['data/io.github.yousaf.ChargeController.policy','data/charge-controller.svg']]"
          dpkg-source --before-build .

      - name: Build package
        run: |
          set -euo pipefail

          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../charge-controller_*_amd64.deb dist/
          ls -lh dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-${{ github.event_name == 'push' && github.ref_name || github.run_number }}
          path: dist/*.deb
          if-no-files-found: error

      - name: Create or update GitHub release
        if: github.event_name == 'push' || inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.deb --clobber
          else
            gh release create "$TAG_NAME" dist/*.deb \
              --title "$TAG_NAME" \
              --notes "Automated Debian package build for $TAG_NAME."
          fi
